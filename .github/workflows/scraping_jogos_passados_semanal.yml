name: 📆 Scraping - Jogos Passados (Semanal)

# Atualiza apenas as temporadas ATUAIS (em andamento)
# Roda toda semana para capturar os jogos da semana

on:
  schedule:
    # Todo domingo às 03h UTC (00h Brasília)
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-past-current:
    name: Passados - ${{ matrix.season }}
    runs-on: ubuntu-latest
    timeout-minutes: 330 # 5h30 - o script já para sozinho em 5.5h
    strategy:
      fail-fast: false # Uma temporada falhar não cancela as outras
      matrix:
        # Só temporadas em andamento (atualizadas toda semana)
        season:
          - "2025"       # Sul América / Ásia calendário ano (24 ligas)
          - "2025-2026"  # Europa (54 ligas)
          - "2026"       # Sul América / Ásia início de ano (24 ligas)

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: |
          cd WebScraping_FlashScore
          pip install -r requirements.txt
          pip install webdriver-manager

      - name: Executar Scraping Passado
        run: |
          cd WebScraping_FlashScore
          python scrape_jogos_passados.py --season ${{ matrix.season }}
          python generate_df_jogos_passados.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit e Push
        if: always() # Salva mesmo se der timeout ou erro
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add WebScraping_FlashScore/jogos_passados/
          git add WebScraping_FlashScore/dataframes_jogos_passados/
          git commit -m "📆 Passados [${{ matrix.season }}]: $(date +'%Y-%m-%d') [skip ci]" || echo "Sem mudanças."
          git push || (git pull --rebase && git push)
