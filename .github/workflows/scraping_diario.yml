name: Scraping Diario FlashScore

on:
  schedule:
    # Roda todos os dias às 08:00 UTC (05:00 Horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  run-scraping:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do repositorio
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Google Chrome e dependencias do SO
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip dbus-x11
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar dependencias do Python
      run: |
        cd WebScraping_FlashScore
        pip install -r requirements.txt
        pip install webdriver-manager # Para garantir que ele consiga baixar o driver

    - name: Executar os Scripts de Scraping
      run: |
        cd WebScraping_FlashScore
        # O script já está configurado para headless=True por padrão no flashscore_scraper.py
        python scrape_jogos_futuros.py
        python scrape_jogos_passados.py
        
    - name: Gerar DataFrames
      run: |
        cd WebScraping_FlashScore
        python generate_df_jogos_futuros.py
        python generate_df_jogos_passados.py
        
    - name: Commit e Push dos dados gerados
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        # Adiciona todas e quaisquer possiveis mudanças em JSONS e CSVs
        git add WebScraping_FlashScore/jogos_futuros/
        git add WebScraping_FlashScore/jogos_passados/
        git add WebScraping_FlashScore/dataframes_jogos_futuros/
        git add WebScraping_FlashScore/dataframes_jogos_passados/
        
        # Faz o commit apenas se houver mudanças, usando '|| echo ...' para evitar que o fluxo falhe se não houver novos dados
        git commit -m "Automacao: Atualizacao diaria dos dados FlashScore [skip ci]" || echo "Sem mudanças para commitar."
        
        # Envia para o repositório
        git push
